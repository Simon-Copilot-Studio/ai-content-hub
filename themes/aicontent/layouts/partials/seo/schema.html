{{/* JSON-LD Structured Data — GEO Optimized */}}
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL | strings.TrimRight "/" }}",
  "description": "{{ .Site.Params.description }}",
  "inLanguage": "zh-TW",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "{{ .Site.BaseURL }}search/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL | strings.TrimRight "/" }}",
  "description": "{{ .Site.Params.description }}",
  "logo": {
    "@type": "ImageObject",
    "url": "{{ .Site.BaseURL }}favicon.ico"
  },
  "sameAs": [
    "https://github.com/Simon-Copilot-Studio",
    "https://twitter.com/AiContentHub",
    "https://www.youtube.com/@AiContentHub",
    "https://www.linkedin.com/company/ai-content-hub"
  ]
}
</script>
{{ end }}

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Summary | truncate 160 | plainify }}{{ end }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "url": "{{ .Permalink }}",
  "inLanguage": "{{ .Params.lang | default "zh-TW" }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "author": [
    { "@type": "Person", "name": "{{ .Params.author | default .Site.Params.author }}", "url": "{{ .Site.BaseURL }}about/" },
    { "@type": "Organization", "name": "{{ .Site.Title }}", "url": "{{ .Site.BaseURL | strings.TrimRight "/" }}" }
  ],
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "url": "{{ .Site.BaseURL | strings.TrimRight "/" }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ .Site.BaseURL }}favicon.ico"
    }
  },
  "image": {
    "@type": "ImageObject",
    "url": "{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ .Site.Params.defaultImage }}{{ end }}"
  },
  "articleSection": "{{ $.Section }}",
  "wordCount": {{ .WordCount }},
  "timeRequired": "PT{{ .ReadingTime }}M"{{ with .Params.tags }},
  "keywords": "{{ delimit . ", " }}"{{ end }},
  "speakable": {
    "@type": "SpeakableSpecification",
    "cssSelector": [".article-content > p:first-of-type", ".article-content > h2"]
  }
}
</script>

{{/* Breadcrumb */}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "首頁", "item": "{{ $.Site.BaseURL | strings.TrimRight "/" }}" },
    { "@type": "ListItem", "position": 2, "name": "{{ $.Section }}", "item": "{{ $.Site.BaseURL }}{{ $.Section }}/" },
    { "@type": "ListItem", "position": 3, "name": "{{ $.Title }}", "item": "{{ $.Permalink }}" }
  ]
}
</script>
{{ end }}
