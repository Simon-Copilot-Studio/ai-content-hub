{{ partial "seo/meta.html" . }}
<meta name="generator" content="Hugo {{ hugo.Version }}">
<!-- Google Search Console -->
<meta name="google-site-verification" content="xUARoNary2GAl1snRYmy9ERfNvqJGoR2R-cfnmD8npM" />
<!-- Bing Webmaster Tools -->
{{ with .Site.Params.bingVerification }}<meta name="msvalidate.01" content="{{ . }}" />{{ end }}
<link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
<!-- Google Fonts: Noto Sans TC + Noto Serif TC -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<!-- Umami Analytics (via Cloudflare Tunnel) -->
{{ if not hugo.IsServer }}
{{ with .Site.Params.umami }}
<script defer src="{{ .scriptUrl }}" data-website-id="{{ .websiteId }}"></script>
{{ end }}
{{ end }}
