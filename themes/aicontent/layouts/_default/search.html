{{ define "main" }}
<div class="container" style="padding:2rem 0;min-height:60vh">
  <h1 style="font-size:2rem;font-weight:800;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    搜尋文章
  </h1>
  <div id="search"></div>
  <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="/pagefind/pagefind-ui.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        translations: {
          placeholder: "搜尋文章...",
          zero_results: "找不到「[SEARCH_TERM]」相關結果",
          many_results: "找到 [COUNT] 筆結果",
          one_result: "找到 1 筆結果",
          filters_label: "篩選",
          clear_search: "清除",
          load_more: "載入更多"
        }
      });
      // Auto-search from URL param
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        const input = document.querySelector('.pagefind-ui__search-input');
        if (input) { input.value = q; input.dispatchEvent(new Event('input')); }
      }
    });
  </script>
</div>
{{ end }}
